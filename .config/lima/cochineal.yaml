# Lima VM "cochineal": a sandbox for running coding agents (claude, etc.)
# with ~/Developer mounted writable.
#
#   limactl start ~/.config/lima/cochineal.yaml   # create + boot + provision (instance name = "cochineal")
#   limactl shell cochineal                       # enter (zsh)
#   limactl stop cochineal                        # shut down
#   limactl start cochineal                       # boot again
#   limactl delete cochineal                      # destroy

vmType: "vz"

# Both arches are listed for portability; Lima downloads ONLY the one
# matching the host (aarch64 on this Mac, x86_64 on a PC).
images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"

# Recommended sizing: ~2/3 of the host's CPUs and 16 GiB RAM. The values below
# fit this 18-CPU / 48 GiB host. cpus/memory can only be set when the instance
# is first CREATED, so on a different host override them with CLI flags at
# create time (they take precedence over the values here), e.g.:
#   limactl start --cpus 8 --memory 16 ~/.config/lima/cochineal.yaml
cpus: 12
memory: "16GiB"
disk: "50GiB"

# Don't install Lima's bundled rootless containerd/nerdctl — we use Docker
# Engine instead (installed in provisioning), which ships its own containerd.
containerd:
  system: false
  user: false

mountType: "virtiofs"
mounts:
  # Host ~/Developer -> guest /Users/eric/Developer, the SAME absolute path as
  # on the host. Mounting at the host path (rather than a neutral /mnt location)
  # means git worktree references — which store absolute paths — resolve
  # identically on host and guest. A provision step also symlinks the guest's
  # ~/Developer -> here for convenience.
  - location: "~/Developer"
    mountPoint: "/Users/eric/Developer"
    writable: true
  # Host claude/agent skills, shared read-only so the guest's claude inherits
  # them (live — host edits show up immediately). The real skill dirs live in
  # ~/.agents/skills; ~/.claude/skills on the host is just symlinks into it, so
  # we share the store and a provision step points guest ~/.claude/skills here.
  - location: "~/.agents/skills"
    mountPoint: "/mnt/agent-skills"
    writable: false

provision:
  # 1. System packages + make zsh the login shell for the Lima user.
  - mode: system
    script: |
      #!/bin/bash
      set -eux
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y zsh tmux git ripgrep curl ca-certificates build-essential
      chsh -s "$(command -v zsh)" "{{.User}}"

      # --- Docker Engine + Compose v2 (rootful; the VM is the sandbox) ---
      # get.docker.com installs docker-ce, the CLI, containerd.io, buildx,
      # and the compose plugin, then enables the daemon via systemd.
      if ! command -v docker >/dev/null 2>&1; then
        curl -fsSL https://get.docker.com | sh
      fi
      # NOTE: this group add only applies to NEW login sessions, and Lima's SSH
      # ControlMaster is authenticated from boot (before this provisioning runs),
      # so the FIRST `limactl shell` after a fresh build wouldn't otherwise see
      # the docker group. The bash->zsh handoff installed below re-execs that
      # session via `sg docker`, so it picks the group up with no restart.
      usermod -aG docker "{{.User}}"

      # --- MOTD: short sandbox cheat-sheet (Ubuntu update-motd.d) ---
      cat > /etc/sandbox-motd <<'MOTDEOF'

      Agent sandbox — ~/Developer is mounted from the macOS host

        nmworktree  set up a fresh worktree/project: VM-local node_modules + install
        nmlocal     give THIS project a VM-local node_modules, then: npm install
        nmunbind    release VM-local node_modules (run before `git worktree remove`)
        nmstatus    list projects with VM-local node_modules

      MOTDEOF
      # Show the cheat-sheet via zlogin (fires on both multiplexed and fresh
      # `limactl shell` logins, unlike pam_motd/update-motd.d). Idempotent: drop
      # any prior copy, then add one.
      sed -i '\#cat /etc/sandbox-motd#d' /etc/zsh/zlogin 2>/dev/null || true
      printf '%s\n' '[[ -o interactive && -t 1 ]] && cat /etc/sandbox-motd 2>/dev/null' >> /etc/zsh/zlogin

      # --- bash -> zsh self-heal: avoid the "restart once after create" dance ---
      # chsh (above) makes zsh the login shell, but it runs AFTER Lima's SSH
      # ControlMaster connected, so the first `limactl shell` on a fresh build
      # lands in bash with the old (no-docker) group set. Rather than require a
      # `limactl restart`, hand that session off to a zsh login shell — joining
      # the docker group via `sg` if it's missing — so the very first shell gets
      # zsh + MOTD + nmstatus + docker. In steady state Lima launches zsh
      # directly and this never fires (zsh doesn't read /etc/bash.bashrc).
      cat > /etc/cochineal-shell-handoff.sh <<'HANDOFFEOF'
      # Sourced from /etc/bash.bashrc (interactive bash only). See cochineal.yaml.
      if [[ $- == *i* ]] && command -v zsh >/dev/null 2>&1; then
        if ! id -nG 2>/dev/null | grep -qw docker && getent group docker >/dev/null 2>&1; then
          exec sg docker -c 'exec zsh -l'
        fi
        exec zsh -l
      fi
      HANDOFFEOF
      # Source it from /etc/bash.bashrc (read by all interactive bash on Ubuntu,
      # login or not). Idempotent: drop any prior line, then add one.
      sed -i '\#cochineal-shell-handoff#d' /etc/bash.bashrc 2>/dev/null || true
      printf '%s\n' '[ -r /etc/cochineal-shell-handoff.sh ] && . /etc/cochineal-shell-handoff.sh' >> /etc/bash.bashrc

  # 2. Per-user setup (runs as the Lima user, with $HOME set).
  - mode: user
    script: |
      #!/bin/bash
      set -eux

      # --- n (Node version manager) + Node LTS, into ~/.local/n per .zshrc ---
      export N_PREFIX="$HOME/.local/n"
      if [ ! -x "$N_PREFIX/bin/n" ]; then
        mkdir -p "$N_PREFIX/bin"
        curl -fsSL https://raw.githubusercontent.com/tj/n/master/bin/n -o "$N_PREFIX/bin/n"
        chmod +x "$N_PREFIX/bin/n"
      fi
      PATH="$N_PREFIX/bin:$PATH" N_PREFIX="$N_PREFIX" "$N_PREFIX/bin/n" lts
      export PATH="$N_PREFIX/bin:$PATH"

      # --- Dotfiles (bare-repo bootstrap; idempotent: it skips if ~/.dotfiles exists) ---
      if [ ! -e "$HOME/.dotfiles" ]; then
        sh -c "$(curl -fsSL https://raw.githubusercontent.com/limulus/dotfiles/main/.config/dotfiles/bootstrap.sh)"
      fi

      # --- ~/Developer -> the mounted host directory (which already lives at the
      #     host's absolute path /Users/eric/Developer); this is just a convenience
      #     shortcut from the guest user's home. ---
      ln -sfn /Users/eric/Developer "$HOME/Developer"

      # --- claude CLI (native installer -> ~/.local/bin) ---
      if [ ! -x "$HOME/.local/bin/claude" ]; then
        curl -fsSL https://claude.ai/install.sh | bash
      fi

      # --- Inherit host skills: the dotfiles track ~/.claude/skills -> ../.agents/skills,
      #     so just make that resolve in the guest by pointing ~/.agents/skills at the
      #     read-only mount of the host's skill store. (~/.claude/skills itself is owned
      #     by the dotfiles checkout, not by provisioning.) Idempotent. ---
      mkdir -p "$HOME/.agents"
      ln -sfn /mnt/agent-skills "$HOME/.agents/skills"

      # --- ~/.zshenv: user tools on PATH for NON-interactive zsh too, so
      #     `cochineal <cmd>` (e.g. `cochineal claude`) resolves them. The
      #     dotfiles set PATH in .zshrc (interactive only); .zshenv covers the
      #     rest. Not tracked by the dotfiles, so safe to write here. ---
      cat > "$HOME/.zshenv" <<'ZENVEOF'
      # User-local tools on PATH for ALL zsh invocations (incl. non-interactive),
      # so `limactl shell cochineal <cmd>` resolves claude/node/npm.
      export PATH="$HOME/bin:$HOME/.local/bin:$HOME/.local/n/bin:$PATH"
      ZENVEOF

      # --- node_modules isolation: `nmlocal` / `nmstatus` / `nmworktree` ---
      # node_modules holds platform-specific native binaries, so it must NOT be
      # shared with the macOS host over the virtiofs mount. `nmlocal` shadows a
      # project's node_modules with VM-local storage via a bind mount (source
      # files stay shared); `nmstatus` reports bind state; `nmworktree` isolates
      # a fresh worktree/project and installs into it (copy-on-write clone of the
      # main checkout's node_modules when possible, else a full `npm install`).
      #
      # These ship as EXECUTABLES in ~/.local/bin (on PATH for every shell), NOT
      # as zsh functions. A coding agent runs tools in a non-interactive *bash*
      # shell that never loads the zsh profile, so functions would be invisible
      # to it — it would see the commands "missing" and hand-roll the bind logic.
      # Executables are reachable from any shell.

      # The VM-local store lives on its own xfs filesystem (a sparse loop image)
      # so it supports reflink/CoW — the guest root is ext4, which can't clone
      # extents. nmworktree exploits this to seed a worktree's node_modules from
      # its main checkout near-instantly (shared extents, ~0 extra disk). The 24G
      # cap is sparse: only blocks actually written cost disk; grow later with
      # `truncate -s <N>G "$NMSTORE_IMG"` + `sudo xfs_growfs <mountpoint>`.
      NMSTORE_IMG="$HOME/.local/share/nmstore.img"
      NMSTORE_MP="$HOME/.local/share/nmstore"
      mkdir -p "$HOME/.local/share"
      if [ ! -f "$NMSTORE_IMG" ]; then
        truncate -s 24G "$NMSTORE_IMG"
        mkfs.xfs -q "$NMSTORE_IMG"
        # Migrate any pre-existing (ext4) store into the image so isolation
        # survives the switch. Non-destructive: the old dir is kept as .pre-xfs.
        if [ -d "$NMSTORE_MP" ] && [ -n "$(ls -A "$NMSTORE_MP" 2>/dev/null)" ] && ! mountpoint -q "$NMSTORE_MP"; then
          _t="$(mktemp -d)"
          sudo mount "$NMSTORE_IMG" "$_t"
          sudo cp -a "$NMSTORE_MP/." "$_t/"
          sudo umount "$_t"; rmdir "$_t"
          mv "$NMSTORE_MP" "$NMSTORE_MP.pre-xfs"
        fi
      fi
      mkdir -p "$NMSTORE_MP"
      # Persist the mount (loop; nofail so a missing image never blocks boot).
      # It must be mounted before _nmrebind re-applies project binds at login.
      if ! grep -qsF " $NMSTORE_MP xfs " /etc/fstab; then
        printf '%s %s xfs loop,nofail,x-systemd.device-timeout=10 0 0\n' \
          "$NMSTORE_IMG" "$NMSTORE_MP" | sudo tee -a /etc/fstab >/dev/null
      fi
      if ! mountpoint -q "$NMSTORE_MP"; then
        sudo mount -o loop "$NMSTORE_IMG" "$NMSTORE_MP" && sudo chown "$(id -u):$(id -g)" "$NMSTORE_MP"
      fi
      # Direct I/O on the loop device so reads aren't page-cached twice (once as
      # xfs pages, once as ext4 backing-file pages) — frees the hot node_modules
      # working set back to general use. Set it now for this session; a udev rule
      # (scoped to this image by backing_file) re-applies it on every boot when
      # fstab brings the loop device up. This kernel exposes no loop/direct_io
      # sysfs attr, so the rule RUNs losetup rather than assigning ATTR=.
      sudo losetup --direct-io=on "$(findmnt -no SOURCE "$NMSTORE_MP")" 2>/dev/null || true
      printf '%s\n' 'ACTION=="add|change", SUBSYSTEM=="block", KERNEL=="loop*", ATTR{loop/backing_file}=="'"$NMSTORE_IMG"'", RUN+="/usr/sbin/losetup --direct-io=on /dev/%k"' \
        | sudo tee /etc/udev/rules.d/99-nmstore-directio.rules >/dev/null
      sudo udevadm control --reload-rules

      mkdir -p "$HOME/.local/bin"
      cat > "$HOME/.local/bin/nmlocal" <<'NMLOCALEOF'
      #!/usr/bin/env zsh
      # Back $PWD's node_modules with VM-local disk. Installed by cochineal.yaml.
      emulate -L zsh
      NMSTORE="$HOME/.local/share/nmstore"; NMREG="$NMSTORE/.registry"
      proj="${PWD:A}"
      if [[ "$proj" != /Users/eric/Developer/* ]]; then
        print -ru2 -- "nmlocal: run inside a project under ~/Developer"; exit 1
      fi
      store="$NMSTORE${proj#/Users/eric/Developer}"
      mkdir -p "$store" "$proj/node_modules"
      if mountpoint -q "$proj/node_modules"; then
        print -- "nmlocal: already VM-local ($proj/node_modules)"; exit 0
      fi
      sudo mount --bind "$store" "$proj/node_modules" || exit 1
      grep -qxF -- "$proj" "$NMREG" 2>/dev/null || print -r -- "$proj" >> "$NMREG"
      print -- "nmlocal: $proj/node_modules is now VM-local -> $store"
      print -- "         run 'npm install' to populate it (host copy is untouched)"
      NMLOCALEOF
      cat > "$HOME/.local/bin/nmstatus" <<'NMSTATUSEOF'
      #!/usr/bin/env zsh
      # List projects with VM-local node_modules and their current bind state.
      emulate -L zsh
      NMREG="$HOME/.local/share/nmstore/.registry"
      [[ -r $NMREG ]] || { print -- "no VM-local node_modules registered"; exit 0 }
      while IFS= read -r proj; do
        if mountpoint -q "$proj/node_modules" 2>/dev/null; then print -- "bound    $proj"
        else print -- "unbound  $proj"; fi
      done < "$NMREG"
      NMSTATUSEOF
      cat > "$HOME/.local/bin/nmworktree" <<'NMWORKTREEEOF'
      #!/usr/bin/env zsh
      # Isolate a git worktree (or any uninstalled project) onto VM-local disk
      # and populate its node_modules. Installed by cochineal.yaml.
      # Usage: nmworktree [project-or-worktree-path]   (default: $PWD)
      #
      # Fast path: when the nmstore is on a reflink-capable fs (xfs) and the
      # worktree's MAIN checkout already has a populated store, seed node_modules
      # with a copy-on-write clone of it — near-instant, ~0 extra disk (extents
      # stay shared until npm rewrites a file). If the worktree's lockfile matches
      # the main checkout's, the clone is exact and install is skipped entirely;
      # otherwise `npm install` reconciles the difference (still fast — most of
      # node_modules is already there). Falls back to a full `npm install` when
      # there's no source store or the fs lacks reflink (e.g. an ext4 store), so
      # it stays correct everywhere.
      emulate -L zsh
      NMSTORE="$HOME/.local/share/nmstore"

      _nm_reflink_ok() {   # $1: a dir on the target fs — true if reflink works
        local d=$1 a=$1/.nmreflink.$$
        : > $a 2>/dev/null || return 1
        cp --reflink=always $a $a.c 2>/dev/null; local rc=$?
        rm -f $a $a.c 2>/dev/null
        return $rc
      }

      proj="${1:-$PWD}"; proj="${proj:A}"
      if [[ "$proj" != /Users/eric/Developer/* ]]; then
        print -ru2 -- "nmworktree: path must be under ~/Developer ($proj)"; exit 1
      fi
      if [[ ! -f "$proj/package.json" ]]; then
        print -ru2 -- "nmworktree: no package.json at $proj — point me at the project/worktree root"; exit 1
      fi
      cd "$proj" || exit 1
      nmlocal || exit 1
      nm="$proj/node_modules"

      # Identify the worktree's main checkout and its store, then CoW-seed from it.
      seeded=0; main=""
      gcd=$(git -C "$proj" rev-parse --git-common-dir 2>/dev/null)
      if [[ -n "$gcd" ]]; then
        [[ "$gcd" = /* ]] || gcd="$proj/$gcd"
        main="${gcd:h:A}"
        srcstore="$NMSTORE${main#/Users/eric/Developer}"
        if [[ "$main" == /Users/eric/Developer/* && "$main" != "$proj" \
              && -n "$(ls -A "$srcstore" 2>/dev/null)" ]] && _nm_reflink_ok "$nm"; then
          print -- "nmworktree: CoW-seeding node_modules from $main …"
          if cp -a --reflink=always "$srcstore/." "$nm/" 2>/dev/null; then
            seeded=1
          else
            print -ru2 -- "nmworktree: CoW seed failed; falling back to a full install"
            find "$nm" -mindepth 1 -delete 2>/dev/null
          fi
        fi
      fi

      # An identical lockfile means the clone is already exact — skip install.
      if [[ $seeded == 1 && -f "$proj/package-lock.json" && -f "$main/package-lock.json" ]] \
         && cmp -s "$proj/package-lock.json" "$main/package-lock.json"; then
        print -- "nmworktree: lockfile matches $main — clone is exact, skipping npm install"
        print -- "nmworktree: $proj is VM-local and installed (CoW)"
        exit 0
      fi

      print -- "nmworktree: running 'npm install' in $proj …"
      npm install || { print -ru2 -- "nmworktree: npm install failed"; exit 1 }
      if [[ $seeded == 1 ]]; then
        print -- "nmworktree: $proj is VM-local and installed (CoW-seeded, reconciled)"
      else
        print -- "nmworktree: $proj is VM-local and installed"
      fi
      NMWORKTREEEOF
      cat > "$HOME/.local/bin/nmunbind" <<'NMUNBINDEOF'
      #!/usr/bin/env zsh
      # Release a project's VM-local node_modules: unmount the bind, deregister it,
      # and free its store (the inverse of nmlocal). Run this BEFORE
      # `git worktree remove` — git's rm -rf of the worktree hits the live
      # node_modules mountpoint and fails with EBUSY otherwise. Installed by
      # cochineal.yaml.
      # Usage: nmunbind [project-path]   (default path: $PWD)
      #
      # Once the worktree is gone its store is orphaned (keyed to a path that no
      # longer exists, dropped from the registry, never rebound), so freeing it is
      # always correct here — no flag to decide. The ONE store worth keeping is the
      # repo's MAIN checkout, since every worktree CoW-seeds node_modules from it;
      # nmunbind detects that case and preserves it.
      emulate -L zsh
      NMSTORE="$HOME/.local/share/nmstore"; NMREG="$NMSTORE/.registry"
      proj="${1:-$PWD}"; proj="${proj:A}"
      nm="$proj/node_modules"
      if mountpoint -q "$nm" 2>/dev/null; then
        sudo umount "$nm" \
          || { print -ru2 -- "nmunbind: umount failed for $nm (still in use? exit shells/processes under it, then retry)"; exit 1 }
        print -- "nmunbind: unmounted $nm"
      else
        print -- "nmunbind: $nm is not a bind mount (nothing to unmount)"
      fi
      # Drop it from the rebind registry so it isn't re-bound on the next boot.
      if [[ -r "$NMREG" ]]; then
        tmp="$NMREG.tmp.$$"
        grep -vxF -- "$proj" "$NMREG" > "$tmp" 2>/dev/null || :
        mv "$tmp" "$NMREG"
      fi
      # Free the orphaned store — UNLESS we can positively confirm this is the
      # repo's MAIN checkout, whose store is the CoW seed source for sibling
      # worktrees. Default to freeing: a linked worktree, a non-git project, or a
      # checkout already half-removed (git info gone) all have orphaned stores, so
      # "can't tell" must mean free, not keep — else stores leak forever. A main
      # checkout has --git-common-dir == its own --git-dir; a linked worktree's
      # common-dir points back under the main checkout, so they differ.
      store="$NMSTORE${proj#/Users/eric/Developer}"
      is_main=0
      gd=$(git -C "$proj" rev-parse --git-dir 2>/dev/null)
      gcd=$(git -C "$proj" rev-parse --git-common-dir 2>/dev/null)
      if [[ -n "$gd" && -n "$gcd" ]]; then
        [[ "$gd" = /* ]] || gd="$proj/$gd"; [[ "$gcd" = /* ]] || gcd="$proj/$gcd"
        [[ "${gd:A}" == "${gcd:A}" ]] && is_main=1   # main checkout, keep its store
      fi
      if [[ "$store" == "$NMSTORE"/* && -d "$store" ]]; then
        if [[ $is_main == 1 ]]; then
          print -- "nmunbind: kept store $store (main checkout — CoW seed for worktrees)"
        else
          rm -rf "$store" && print -- "nmunbind: freed orphaned store $store"
        fi
      fi
      print -- "nmunbind: $proj released — safe to 'git worktree remove' now"
      NMUNBINDEOF
      chmod +x "$HOME/.local/bin/nmlocal" "$HOME/.local/bin/nmstatus" "$HOME/.local/bin/nmworktree" "$HOME/.local/bin/nmunbind"

      # Per-boot rebind: the VM-local stores persist across reboots but the bind
      # mounts don't, so re-apply them on the first interactive login after a
      # boot. This stays a zsh login hook (a side effect, not a user command).
      mkdir -p "$HOME/.config/zsh"
      cat > "$HOME/.config/zsh/lima-nodemodules.zsh" <<'NMEOF'
      # VM-local node_modules: re-apply binds once per boot. The nmlocal/nmstatus
      # commands live in ~/.local/bin (on PATH for every shell).
      NMSTORE="$HOME/.local/share/nmstore"; NMREG="$NMSTORE/.registry"
      _nmrebind() {
        emulate -L zsh
        [[ -r $NMREG && ! -e /run/user/$UID/.nmrebind ]] || return 0
        local proj store
        while IFS= read -r proj; do
          store="$NMSTORE${proj#/Users/eric/Developer}"
          [[ -d $proj && -d $store ]] || continue
          mountpoint -q "$proj/node_modules" 2>/dev/null && continue
          mkdir -p "$proj/node_modules"
          sudo mount --bind "$store" "$proj/node_modules" 2>/dev/null
        done < "$NMREG"
        : > /run/user/$UID/.nmrebind 2>/dev/null
      }
      _nmrebind
      NMEOF

      # --- Agent memory: tell the guest's claude about this sandbox ---
      # ~/.claude/CLAUDE.md is dotfiles-tracked and SHARED with the macOS host
      # (the /difit notes), so VM-specific facts can't live there. Instead write
      # a guest-only ~/.claude/cochineal.md and import it from CLAUDE.md. The
      # import line is added in the guest only (host CLAUDE.md is never touched);
      # both the file and the import are reconstructed on every rebuild.
      mkdir -p "$HOME/.claude"
      cat > "$HOME/.claude/cochineal.md" <<'COCHINEALEOF'
      # Sandbox: the "cochineal" Lima VM

      You're in **cochineal**, a disposable Lima VM on a macOS host. The VM is
      throwaway, but **edits under `~/Developer` are not** — it's shared live
      with the host at the same path (`/Users/eric/Developer`).

      - **`node_modules` must not live on the shared mount** (native binaries
        clash between the Linux VM and the macOS host). So **after creating a git
        worktree, always run `nmworktree`** before any `npm install`, test, or
        build — it isolates node_modules onto VM-local disk and populates it;
        skipping it pollutes the shared mount with Linux binaries. (Use
        **`nmlocal`** alone to isolate an already-installed project, **`nmstatus`**
        to see what's isolated. Registered projects re-bind each boot, so active
        ones are usually ready.)
      - **Before removing a worktree, run `nmunbind` first**
        (`nmunbind <worktree-path>`, then `git worktree remove <worktree-path>`).
        `node_modules` is a bind mount, so `git worktree remove` would otherwise
        fail with "Device or resource busy" while trying to delete it. `nmunbind`
        unmounts it, deregisters it, and frees its (now-orphaned) VM-local store;
        after that the removal succeeds. No flags to weigh — it preserves the main
        checkout's store automatically.
      - **Changes outside `~/Developer` don't survive a rebuild**; the VM's setup
        lives in `~/.config/lima/cochineal.yaml` on the host (not mounted here),
        so raise persistent changes with the user.
      COCHINEALEOF

      # Wire the import into the guest's CLAUDE.md (idempotent; guest-only).
      if [ -f "$HOME/.claude/CLAUDE.md" ]; then
        grep -qxF '@cochineal.md' "$HOME/.claude/CLAUDE.md" \
          || printf '\n@cochineal.md\n' >> "$HOME/.claude/CLAUDE.md"
      fi

# Don't return from `limactl start` until the agent tooling is actually present.
probes:
  - description: "node, claude, and docker to be installed"
    script: |
      #!/bin/bash
      set -eux
      if ! timeout 300s bash -c "until test -x ~/.local/n/bin/node && test -x ~/.local/bin/claude && command -v docker >/dev/null 2>&1; do sleep 3; done"; then
        echo "provisioning did not finish in time" >&2
        exit 1
      fi
    hint: |
      Provisioning is incomplete. Inspect the guest logs with:
      limactl shell cochineal sudo cat /var/log/cloud-init-output.log
